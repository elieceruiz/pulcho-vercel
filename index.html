<!DOCTYPE html>
<html>
<head>
  <title>Pulcho</title>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "75e8a57e-649c-49bc-beed-addc802ac1c9",
        notifyButton: { enable: true }
      });

      // 🔥 esto sí es oficial
      const permission = OneSignal.Notifications.permission;
      const isSubscribed = await OneSignal.User.PushSubscription.optedIn;

      console.log("Permiso:", permission);
      console.log("Suscrito:", isSubscribed);

      // ✅ REDIRECCIÓN LIMPIA
      if (isSubscribed && !window.location.href.includes("streamlit")) {
        console.log("🔁 Redirigiendo a Streamlit...");
        window.location.href = "https://pulcho.streamlit.app/";
        return;
      }

      // 🆕 SOLO si nunca decidió
      if (permission === "default") {
        console.log("🔔 Mostrando prompt...");
        OneSignal.Slidedown.promptPush();
      }

      // ❌ ya rechazó → no molestar
      if (permission === "denied") {
        console.log("🚫 Usuario bloqueó notificaciones");
      }
    });
  </script>
</head>

<body>
  <h2>Pulcho activo</h2>
  <p>Activa notificaciones 🔔</p>
</body>
</html>
