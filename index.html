<!DOCTYPE html>
<html>
<head>
  <title>Pulcho</title>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    OneSignalDeferred.push(async function(OneSignal) {

      console.log("🚀 Iniciando OneSignal...");

      await OneSignal.init({
        appId: "75e8a57e-649c-49bc-beed-addc802ac1c9",
        notifyButton: { enable: true }
      });

      console.log("✅ OneSignal inicializado");

      // 🔥 función robusta para leer estado REAL
      async function getEstadoReal() {
        return {
          permission: OneSignal.Notifications.permission,
          optedIn: OneSignal.User.PushSubscription.optedIn,
          id: OneSignal.User.PushSubscription.id
        };
      }

      // 🔥 esperar a que OneSignal termine de hidratarse
      await new Promise(resolve => setTimeout(resolve, 2000));

      let estado = await getEstadoReal();

      console.log("📊 Estado inicial:");
      console.log("Permiso:", estado.permission);
      console.log("Suscrito:", estado.optedIn);
      console.log("ID:", estado.id);

      // 🔔 SOLO mostrar prompt si nunca ha decidido
      if (estado.permission === "default") {
        console.log("🔔 Mostrando prompt...");
        await OneSignal.Slidedown.promptPush();
      }

      // 🔄 escuchar cambio REAL de suscripción
      OneSignal.User.PushSubscription.addEventListener("change", async () => {
        console.log("🔄 Cambio detectado en suscripción...");

        // esperar estabilización
        await new Promise(resolve => setTimeout(resolve, 1500));

        const nuevoEstado = await getEstadoReal();

        console.log("📊 Estado actualizado:");
        console.log("Suscrito:", nuevoEstado.optedIn);
        console.log("ID:", nuevoEstado.id);

        if (nuevoEstado.optedIn && nuevoEstado.id) {
          console.log("✅ Usuario registrado correctamente");

          setTimeout(() => {
            console.log("🔁 Redirigiendo a Streamlit...");
            window.location.href = "https://pulcho.streamlit.app/";
          }, 1500);
        }
      });

      // 🔁 caso: ya estaba suscrito desde antes
      if (estado.optedIn && estado.id) {
        console.log("✅ Usuario ya estaba suscrito");

        setTimeout(() => {
          console.log("🔁 Redirigiendo a Streamlit...");
          window.location.href = "https://pulcho.streamlit.app/";
        }, 1500);
      }

    });
  </script>
</head>

<body>
  <h2>Pulcho activo</h2>
  <p>Activa notificaciones 🔔</p>
</body>
</html>
