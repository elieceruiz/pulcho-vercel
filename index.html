<!DOCTYPE html>
<html>
<head>
  <title>Pulcho</title>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "75e8a57e-649c-49bc-beed-addc802ac1c9",
        notifyButton: { enable: true }
      });

      console.log("🚀 OneSignal iniciado");

      // 🔥 LEER ESTADO REAL (con await)
      let permission = await OneSignal.Notifications.permission;
      let isSubscribed = await OneSignal.User.PushSubscription.optedIn;
      let id = await OneSignal.User.PushSubscription.id;

      console.log("Permiso:", permission);
      console.log("Suscrito:", isSubscribed);
      console.log("ID:", id);

      // 🔔 Mostrar prompt si no ha decidido
      if (permission === "default") {
        console.log("🔔 Mostrando prompt...");
        await OneSignal.Slidedown.promptPush();
      }

      // 🔥 DEBUG REAL (no valores viejos)
      setTimeout(async () => {
        const freshPermission = await OneSignal.Notifications.permission;
        const freshSubscribed = await OneSignal.User.PushSubscription.optedIn;
        const freshId = await OneSignal.User.PushSubscription.id;
        const ua = navigator.userAgent;

        alert(
          "Permission: " + freshPermission +
          "\nSubscribed: " + freshSubscribed +
          "\nID: " + freshId +
          "\nUA: " + ua
        );
      }, 4000);

      // 🔥 Evento REAL cuando cambia la suscripción
      OneSignal.User.PushSubscription.addEventListener("change", async () => {
        const finalId = await OneSignal.User.PushSubscription.id;
        const finalOpt = await OneSignal.User.PushSubscription.optedIn;

        console.log("🔄 Cambio detectado");
        console.log("ID final:", finalId);

        alert("🔄 Subscription lista:\nID: " + finalId);

        if (finalOpt && finalId) {
          console.log("✅ Registro completo");

          setTimeout(() => {
            window.location.href = "https://pulcho.streamlit.app/";
          }, 2000);
        }
      });

      // 🔁 Caso: ya estaba suscrito (usar valores reales)
      if (isSubscribed && id) {
        console.log("✅ Ya estaba suscrito");

        setTimeout(() => {
          window.location.href = "https://pulcho.streamlit.app/";
        }, 2000);
      }
    });
  </script>
</head>

<body>
  <h2>Pulcho activo</h2>
  <p>Activa notificaciones 🔔</p>
</body>
</html>
