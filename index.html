<!DOCTYPE html>
<html>
<head>
  <title>Pulcho</title>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "75e8a57e-649c-49bc-beed-addc802ac1c9",
        notifyButton: { enable: true }
      });

      console.log("🚀 OneSignal iniciado");

      // 🔥 estado real
      let optedIn = await OneSignal.User.PushSubscription.optedIn;
      let id = await OneSignal.User.PushSubscription.id;

      console.log("Suscrito:", optedIn);
      console.log("ID:", id);

      // 🔔 FORZAR PROMPT SI NO ESTÁ SUSCRITO
      if (!optedIn) {
        console.log("🔔 Forzando prompt...");
        await OneSignal.Slidedown.promptPush();
      }

      // 🔥 DEBUG REAL (espera a que OneSignal respire)
      setTimeout(async () => {
        const freshOpt = await OneSignal.User.PushSubscription.optedIn;
        const freshId = await OneSignal.User.PushSubscription.id;
        const ua = navigator.userAgent;

        alert(
          "Subscribed: " + freshOpt +
          "\nID: " + freshId +
          "\nUA: " + ua
        );
      }, 4000);

      // 🔄 CUANDO SE COMPLETE LA SUSCRIPCIÓN
      OneSignal.User.PushSubscription.addEventListener("change", async () => {
        const finalId = await OneSignal.User.PushSubscription.id;
        const finalOpt = await OneSignal.User.PushSubscription.optedIn;

        console.log("🔄 Cambio detectado");
        console.log("ID final:", finalId);

        alert("✅ Subscription lista:\nID: " + finalId);

        if (finalOpt && finalId) {
          console.log("🚀 Redirigiendo...");

          setTimeout(() => {
            window.location.href = "https://pulcho.streamlit.app/";
          }, 2000);
        }
      });

      // 🔁 SI YA ESTABA SUSCRITO
      if (optedIn && id) {
        console.log("✅ Ya estaba suscrito");

        setTimeout(() => {
          window.location.href = "https://pulcho.streamlit.app/";
        }, 2000);
      }
    });
  </script>
</head>

<body>
  <h2>Pulcho activo</h2>
  <p>Activa notificaciones 🔔</p>
</body>
</html>
