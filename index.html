<!DOCTYPE html>
<html>
<head>
  <title>Pulcho</title>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "75e8a57e-649c-49bc-beed-addc802ac1c9",
        notifyButton: { enable: true }
      });

      console.log("🚀 OneSignal iniciado");

      // 🔥 ESPERAR a que OneSignal esté listo DE VERDAD
      await new Promise(resolve => setTimeout(resolve, 2000));

      const permission = OneSignal.Notifications.permission;
      const subscription = OneSignal.User.PushSubscription;

      console.log("Permiso:", permission);
      console.log("Suscripción:", subscription);

      // 🔥 ESTE ES EL DATO CLAVE
      const playerId = subscription.id;
      const isSubscribed = subscription.optedIn;

      console.log("Player ID:", playerId);
      console.log("Suscrito:", isSubscribed);

      // 🚨 SI NO HAY ID → NO EXISTES
      if (!playerId) {
        console.log("❌ No hay player_id → no registrado");

        if (permission === "default") {
          console.log("🔔 Mostrando prompt...");
          OneSignal.Slidedown.promptPush();
        }

        return;
      }

      // ✅ SOLO SI YA ESTÁ BIEN REGISTRADO
      if (isSubscribed && playerId) {
        console.log("✅ Usuario correctamente registrado");

        setTimeout(() => {
          console.log("🔁 Redirigiendo a Streamlit...");
          window.location.href = "https://pulcho.streamlit.app/";
        }, 1500);
      }
    });
  </script>
</head>

<body>
  <h2>Pulcho activo</h2>
  <p>Activa notificaciones 🔔</p>
</body>
</html>
