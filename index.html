<!DOCTYPE html>
<html>
<head>
  <title>Pulcho</title>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "75e8a57e-649c-49bc-beed-addc802ac1c9",
        notifyButton: { enable: true }
      });

      console.log("🚀 OneSignal iniciado");

      const permission = OneSignal.Notifications.permission;
      const isSubscribed = OneSignal.User.PushSubscription.optedIn;

      console.log("Permiso:", permission);
      console.log("Suscrito:", isSubscribed);

      // 🔔 Mostrar prompt si no ha decidido
      if (permission === "default") {
        console.log("🔔 Mostrando prompt...");
        OneSignal.Slidedown.promptPush();
      }

      // 🔥 DEBUG: ver estado real después de unos segundos
      setTimeout(() => {
        const id = OneSignal.User.PushSubscription.id;
        const ua = navigator.userAgent;

        alert(
          "Permission: " + permission +
          "\nSubscribed: " + isSubscribed +
          "\nID: " + id +
          "\nUA: " + ua
        );
      }, 4000);

      // 🔥 Evento REAL cuando cambia la suscripción
      OneSignal.User.PushSubscription.addEventListener("change", () => {
        const finalId = OneSignal.User.PushSubscription.id;
        const optedIn = OneSignal.User.PushSubscription.optedIn;

        console.log("🔄 Cambio detectado");
        console.log("ID final:", finalId);

        alert("🔄 Subscription lista:\nID: " + finalId);

        if (optedIn && finalId) {
          console.log("✅ Registro completo");

          setTimeout(() => {
            window.location.href = "https://pulcho.streamlit.app/";
          }, 2000);
        }
      });

      // 🔁 Caso: ya estaba suscrito
      const existingId = OneSignal.User.PushSubscription.id;

      if (isSubscribed && existingId) {
        console.log("✅ Ya estaba suscrito");

        setTimeout(() => {
          window.location.href = "https://pulcho.streamlit.app/";
        }, 2000);
      }
    });
  </script>
</head>

<body>
  <h2>Pulcho activo</h2>
  <p>Activa notificaciones 🔔</p>
</body>
</html>
